  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

a(60,40,15,0.18);\n\n  /* Ink — pushed darker for contrast */\n  --bark:#231708;\n  --bark-mid:#5A3F1E;        /* readable body color (was 6B4F2A) */\n  --bark-soft:#8A6F4A;        /* metadata only */\n\n  /* Brand */\n  --clay:#B86A2C;             /* slightly deeper for AA on cream */\n  --clay-light:#F2E2C9;\n  --clay-pale:#FBF2E0;\n  --sage:#2F5C39;             /* deeper for AA */\n  --sage-light:#DCE7DD;\n  --auburn:#9A2F12;            /* deeper for AA */\n  --auburn-light:#F2D9D0;\n  --auburn-mid:#B5421B;\n\n  /* Type scale — modular, 4px baseline rhythm */\n  --t-eyebrow:10px;\n  --t-meta:11px;\n  --t-body:13px;\n  --t-body-lg:14px;\n  --t-h4:15px;\n  --t-h3:18px;\n  --t-h2:22px;\n  --t-h1:28px;\n  --t-display:34px;\n\n  /* Spacing — 4px base */\n  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px; --s8:40px; --s9:56px;\n\n  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-pill:999px;\n\n  --ease:cubic-bezier(.4,0,.2,1);\n}\n\nhtml,body{font-family:'Bricolage Grotesque','Helvetica Neue',Helvetica,Arial,sans-serif}\nbody{\n  background:var(--cream);\n  color:var(--bark);\n  -webkit-font-smoothing:antialiased;\n  -moz-osx-font-smoothing:grayscale;\n  line-height:1.5;\n  letter-spacing:-0.005em;\n}\n\nbutton{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}\ninput,textarea{font-family:inherit;color:inherit}\n::selection{background:var(--clay);color:#fff}\n\n/* ── SHELL ─────────────────────────────────────── */\n.shell{\n  display:grid;\n  grid-template-columns:232px 1fr;\n  min-height:100vh;\n  transition:grid-template-columns .25s var(--ease);\n}\n.shell.col{grid-template-columns:60px 1fr}\n\n/* ── SIDEBAR ───────────────────────────────────── */\n.sidebar{\n  background:var(--bark);\n  display:flex;flex-direction:column;\n  position:sticky;top:0;\n  height:100vh;\n  overflow:hidden;\n  border-right:1px solid rgba(0,0,0,.2);\n}\n.sb-top{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:var(--s5) var(--s4);\n  height:72px;\n  border-bottom:1px solid rgba(255,255,255,.07);\n  flex-shrink:0;\n}\n.lw{flex:1;min-width:0;transition:opacity .2s var(--ease)}\n.shell.col .lw{opacity:0;pointer-events:none}\n.logo{\n  font-size:15px;font-weight:800;color:#fff;\n  line-height:1.15;letter-spacing:-.01em;white-space:nowrap;\n}\n.tagline{\n  font-family:'Lora',Georgia,serif;\n  font-size:10px;color:rgba(255,255,255,.42);\n  margin-top:5px;font-style:italic;white-space:nowrap;\n}\n.tog{\n  width:30px;height:30px;border-radius:8px;\n  background:rgba(255,255,255,.06);\n  border:1px solid rgba(255,255,255,.10);\n  display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;transition:background .15s var(--ease);\n}\n.tog:hover{background:rgba(255,255,255,.13)}\n\n.nsl{\n  font-size:10px;font-weight:700;letter-spacing:.14em;\n  text-transform:uppercase;color:rgba(255,255,255,.32);\n  padding:var(--s5) var(--s4) var(--s2);\n  white-space:nowrap;\n}\n.shell.col .nsl{opacity:0}\n\n.ni{\n  display:flex;align-items:center;gap:var(--s3);\n  padding:10px var(--s4);\n  font-size:13px;font-weight:500;\n  color:rgba(255,255,255,.62);\n  white-space:nowrap;cursor:pointer;\n  border-left:2px solid transparent;\n  transition:background .15s var(--ease),color .15s var(--ease);\n}\n.ni:hover{background:rgba(255,255,255,.05);color:#fff}\n.ni.active{\n  background:rgba(184,106,44,.16);\n  color:#fff;font-weight:700;\n  border-left-color:var(--clay);\n}\n.ni-icon{width:16px;height:16px;flex-shrink:0;opacity:.85}\na.ni{text-decoration:none}\n.ni-ext{color:rgba(255,255,255,.45)}\n.ni-ext .ni-icon{opacity:.6}\n.ni-ext:hover{color:#fff}\n.ni-ext:hover .ni-icon{opacity:.95}\n.nl{transition:opacity .15s var(--ease)}\n.shell.col .nl{opacity:0}\n\n.sbf{\n  margin-top:auto;\n  padding:var(--s4);\n  border-top:1px solid rgba(255,255,255,.07);\n  display:flex;align-items:center;gap:var(--s3);\n  flex-shrink:0;\n}\n.uav{\n  width:32px;height:32px;border-radius:50%;\n  background:linear-gradient(135deg,var(--clay),#8C4E1C);\n  display:flex;align-items:center;justify-content:center;\n  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;\n}\n.sbfn{font-size:12.5px;color:#fff;font-weight:600;line-height:1.2}\n.sbfr{font-size:10px;color:rgba(255,255,255,.45);font-weight:500;margin-top:2px}\n.shell.col .sbf-meta{opacity:0}\n\n/* ── MAIN ──────────────────────────────────────── */\n.main{min-width:0;background:var(--cream)}\n.screen{display:none}\n.screen.active{display:block}\n\n/* ── REUSABLE PIECES ───────────────────────────── */\n.card{\n  background:var(--surface);\n  border:1px solid var(--warm-line);\n  border-radius:var(--r-md);\n  padding:var(--s5);\n}\n.card-head{\n  display:flex;justify-content:space-between;align-items:baseline;\n  margin-bottom:var(--s4);\n}\n.card-title{\n  font-size:var(--t-h4);font-weight:800;\n  color:var(--bark);letter-spacing:-.015em;\n  line-height:1.2;\n}\n.card-link{\n  font-size:11px;font-weight:700;color:var(--clay);\n  letter-spacing:.02em;\n}\n.card-link:hover{text-decoration:underline;text-underline-offset:3px}\n\n.eyebrow{\n  font-size:var(--t-eyebrow);font-weight:800;\n  letter-spacing:.16em;text-transform:uppercase;\n  color:var(--clay);\n  margin-bottom:var(--s3);\n}\n.eyebrow-light{color:rgba(255,255,255,.55)}\n.eyebrow-bark{color:var(--bark-soft)}\n\n.dark-card{background:var(--bark);border-radius:var(--r-md);padding:var(--s5);color:#fff}\n.clay-card{background:var(--clay-pale);border:1px solid var(--warm-line);border-radius:var(--r-md);padding:var(--s5)}\n.sage-card{background:var(--sage-light);border:1px solid rgba(47,92,57,.15);border-radius:var(--r-md);padding:var(--s5)}\n\n.lora{font-family:'Lora',Georgia,serif}\n\n/* Pretty type defaults */\n.body-text{\n  font-size:var(--t-body-lg);\n  line-height:1.65;\n  color:var(--bark-mid);\n  font-weight:500;\n  text-wrap:pretty;\n}\n\n/* Buttons — unified scale */\n.btn{\n  font-size:13px;font-weight:700;\n  padding:9px 16px;border-radius:var(--r-sm);\n  display:inline-flex;align-items:center;justify-content:center;gap:6px;\n  transition:transform .12s var(--ease),background .15s var(--ease),box-shadow .15s var(--ease);\n  letter-spacing:-.005em;line-height:1.2;\n}\n.btn:hover{transform:translateY(-1px)}\n.btn-primary{background:var(--auburn);color:#fff}\n.btn-primary:hover{background:#7d2510;box-shadow:0 4px 12px rgba(154,47,18,.25)}\n.btn-secondary{background:var(--clay);color:#fff}\n.btn-secondary:hover{background:#9C5723}\n.btn-outline{background:transparent;color:var(--auburn);border:1.5px solid var(--auburn)}\n.btn-outline:hover{background:var(--auburn-light)}\n.btn-ghost{background:var(--surface);color:var(--bark-mid);border:1px solid var(--warm-line-strong)}\n.btn-ghost:hover{background:var(--clay-pale);border-color:var(--clay);color:var(--bark)}\n.btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}\n.btn-block{width:100%;display:flex}\n\n/* Badges */\n.badge{\n  display:inline-flex;align-items:center;\n  font-size:10px;font-weight:800;\n  padding:3px 9px;border-radius:var(--r-pill);\n  letter-spacing:.04em;text-transform:uppercase;line-height:1.4;\n}\n.badge-clay{background:var(--clay-light);color:#7A4316}\n.badge-sage{background:var(--sage-light);color:var(--sage)}\n.badge-auburn{background:var(--auburn-light);color:var(--auburn)}\n.badge-bark{background:var(--soft);color:var(--bark-mid)}\n.badge-dot{width:6px;height:6px;border-radius:50%;margin-right:6px}\n\n/* Generic page header */\n.page-header{\n  background:var(--clay-pale);\n  border-bottom:1px solid var(--warm-line-strong);\n  padding:var(--s7) var(--s8) var(--s6);\n}\n.page-title{\n  font-size:var(--t-h1);font-weight:800;\n  color:var(--bark);letter-spacing:-.025em;\n  line-height:1.1;\n}\n.page-sub{\n  font-size:var(--t-body-lg);\n  color:var(--bark-mid);\n  margin-top:var(--s2);\n  line-height:1.55;\n  max-width:60ch;\n  font-weight:500;\n}\n\n.body-grid{\n  padding:var(--s6) var(--s8) var(--s9);\n  display:grid;\n  grid-template-colum 0px}\n.auth-safety-row{display:flex;gap:10px;font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.65)}\n.auth-safety-row .tick{color:#9DBEA4;font-weight:800}\n.auth-main{display:flex;align-items:center;justify-content:center;padding:48px 32px}\n.auth-card{width:100%;max-width:440px}\n.auth-view{display:none}\n.auth-view.on{display:block}\n.auth-kicker{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--clay);margin-bottom:10px}\n.auth-h{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1.12;margin:0 0 8px;text-wrap:pretty}\n.auth-sub{font-family:'Lora',Georgia,serif;font-style:italic;font-size:14px;color:var(--bark-mid);line-height:1.6;margin:0 0 24px;text-wrap:pretty}\n.auth-tabs{display:flex;gap:6px;background:var(--soft);padding:4px;border-radius:10px;margin-bottom:26px}\n.auth-tab{flex:1;padding:9px 12px;border:none;border-radius:7px;background:transparent;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--bark-mid);cursor:pointer}\n.auth-tab.on{background:var(--surface);color:var(--bark);box-shadow:0 1px 4px rgba(35,23,8,.08)}\n.f-row{margin-bottom:14px}\n.f-lbl{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--bark-soft);margin-bottom:6px}\n.f-in{width:100%;box-sizing:border-box;padding:11px 13px;border:1.5px solid var(--warm-line-strong);border-radius:8px;background:var(--surface);font-family:inherit;font-size:14px;color:var(--bark)}\n.f-in:focus{outline:none;border-color:var(--clay)}\n.f-hint{font-size:11.5px;color:var(--bark-soft);margin-top:5px;line-height:1.5}\n.auth-row-split{display:flex;justify-content:space-between;align-items:center;margin:4px 0 18px;font-size:12px}\n.auth-progress{display:flex;gap:5px;margin-bottom:22px}\n.auth-progress .pp{height:4px;flex:1;border-radius:2px;background:var(--soft)}\n.auth-progress .pp.on{background:var(--clay)}\n.role-note{display:flex;gap:10px;background:var(--sage-light);border-radius:10px;padding:13px 15px;margin-bottom:20px;font-size:12.5px;line-height:1.55;color:var(--bark)}\n.role-note .tick{color:var(--sage);font-weight:800}\n.demo-strip{margin-top:26px;border-top:1px dashed var(--warm-line-strong);padding-top:16px}\n.demo-strip-t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--bark-soft);margin-bottom:10px}\n.demo-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n.demo-chip{padding:7px 6px;border:1px solid var(--warm-line-strong);border-radius:999px;background:var(--surface);font-family:inherit;font-size:11.5px;font-weight:600;color:var(--bark-mid);cursor:pointer;text-align:center;white-space:nowrap}\n.demo-chip:hover{border-color:var(--clay);color:var(--bark)}\n.who-grid{display:grid;gap:10px;margin-bottom:6px}\n.who-card{display:flex;gap:14px;align-items:center;padding:15px 16px;border:1.5px solid var(--warm-line-strong);border-radius:12px;background:var(--surface);cursor:pointer;text-align:left;font-family:inherit}\n.who-card:hover{border-color:var(--clay)}\n.who-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}\n.who-name{font-size:14px;font-weight:800;color:var(--bark)}\n.who-role{font-size:11.5px;color:var(--bark-soft);font-weight:600;margin-top:2px}\n.who-arrow{margin-left:auto;color:var(--bark-soft);font-weight:700}\n.vet-check{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--warm-line)}\n.vet-check:last-child{border-bottom:none}\n.vc-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}\n.vc-done{background:var(--sage);color:#fff}\n.vc-wait{background:var(--clay-pale);color:#7A4316;border:1.5px dashed var(--clay)}\n.vc-t{font-size:13px;font-weight:700;color:var(--bark)}\n.vc-s{font-size:11.5px;color:var(--bark-mid);line-height:1.5;margin-top:2px}\n.cm-badge{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;background:var(--sage-light);color:var(--sage);border-radius:999px;padding:3px 9px;margin-left:8px;vertical-align:middle}\n.done-wrap{text-align:center;padding:14px 0}\n.done-orb{width:54px;height:54px;border-radius:50%;background:var(--sage);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 18px}\n.next-card{background:var(--surface);border:1px solid var(--warm-line);border-radius:12px;padding:16px 18px;margin-top:20px;text-align:left}\n.next-t{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--bark-soft);margin-bottom:10px}\n.next-li{display:flex;gap:10px;font-size:13px;color:var(--bark);line-height:1.55;padding:5px 0}\n.next-li .n{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--clay);padding-top:3px}\n.consent-box{background:var(--clay-pale);border:1px solid var(--warm-line-strong);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:12.5px;line-height:1.6;color:var(--bark)}\n.auth-back{background:none;border:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--bark-soft);cursor:pointer;padding:0;margin-bottom:18px}\n.auth-back:hover{color:var(--bark)}\n.btn{font-size:13px;font-weight:700;padding:11px 18px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px}\n.btn-primary{background:var(--auburn);color:#fff}.btn-primary:hover{background:#7d2510}\n.btn-ghost{background:var(--surface);color:var(--bark-mid);border:1px solid var(--warm-line-strong)}.btn-ghost:hover{background:var(--clay-pale)}\n.btn-block{width:100%}\n@media(max-width:860px){.auth-shell{grid-template-columns:1fr}.auth-brand{display:none}}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"auth-shell\">\n  <aside class=\"auth-brand\">\n    <div>\n      <div class=\"auth-logo\">\n        <div class=\"auth-logo-mark\">CM<\u002Fdiv>\n        <div><div class=\"auth-logo-name\">Cultured Mornings<\u002Fdiv><div class=\"auth-logo-sub\">Member portal<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <blockquote class=\"auth-quote\">Every seat at this table was set on purpose — for you.<span class=\"auth-quote-attr\">— The Cultured Mornings team<\u002Fspan><\u002Fblockquote>\n    <div class=\"auth-safety\">\n      <div class=\"auth-safety-row\"><span class=\"tick\">✓<\u002Fspan><span>Invite-only. Every member, mentor, and partner is vetted by our team before they get access.<\u002Fspan><\u002Fdiv>\n      <div class=\"auth-safety-row\"><span class=\"tick\">✓<\u002Fspan><span>Guardians are part of the process for members under 18.<\u002Fspan><\u002Fdiv>\n      <div class=\"auth-safety-row\"><span class=\"tick\">✓<\u002Fspan><span>Real people review everything — mentor pairings, milestones, and messages are never left to an algorithm.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n  <main class=\"auth-main\">\n    <div class=\"auth-card\">\n\n      <!-- LANDING -->\n      <div class=\"auth-view on\" id=\"v-landing\" data-screen-label=\"Sign in landing\">\n        <div class=\"auth-kicker\">Welcome<\u002Fdiv>\n        <h1 class=\"auth-h\">Good morning.<\u002Fh1>\n        <p class=\"auth-sub\">Sign in to your portal — or activate your account if an invite from the team landed in your inbox.<\u002Fp>\n        <div class=\"auth-tabs\">\n          <button class=\"auth-tab on\" id=\"tab-signin\" onclick=\"authTab('signin')\">Sign in<\u002Fbutton>\n          <button class=\"auth-tab\" id=\"tab-invite\" onclick=\"authTab('invite')\">I have an invite<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"pane-signin\">\n          <div class=\"f-row\"><label class=\"f-lbl\">Email<\u002Flabel><input class=\"f-in\" id=\"si-email ail and role.<\u002Fp>\n        <div class=\"f-row\"><label class=\"f-lbl\">Staff email<\u002Flabel><input class=\"f-in\" value=\"aaliyah@culturedmornings.org\" disabled=\"\" style=\"background:var(--soft)\"><div class=\"f-hint\">Locked to your invite — staff accounts require a culturedmornings.org address.<\u002Fdiv><\u002Fdiv>\n        <div class=\"f-row\"><label class=\"f-lbl\">Role<\u002Flabel><input class=\"f-in\" value=\"Program coordinator · full admin access\" disabled=\"\" style=\"background:var(--soft)\"><\u002Fdiv>\n        <div class=\"f-row\"><label class=\"f-lbl\">Create password<\u002Flabel><input class=\"f-in\" type=\"password\" placeholder=\"At least 12 characters\"><\u002Fdiv>\n        <div class=\"role-note\"><span class=\"tick\">✓<\u002Fspan><span>Staff accounts use two-step verification — you'll confirm a code from your phone each time you sign in. Staff see intake answers, guardian contacts, and review queues, so this is non-negotiable.<\u002Fspan><\u002Fdiv>\n        <button class=\"btn btn-primary btn-block\" onclick=\"goView('v-sta-1b')\">Set up two-step verification →<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"auth-view\" id=\"v-sta-1b\" data-screen-label=\"Staff activation — 2FA\">\n        <button class=\"auth-back\" onclick=\"goView('v-sta-1')\">← Back<\u002Fbutton>\n        <div class=\"auth-progress\"><div class=\"pp on\"><\u002Fdiv><div class=\"pp on\"><\u002Fdiv><div class=\"pp\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"auth-kicker\">CM Staff · Step 2 of 3<\u002Fdiv>\n        <h1 class=\"auth-h\">Confirm your phone.<\u002Fh1>\n        <p class=\"auth-sub\">We sent a 6-digit code to the number on your staff record (•••) •••-4418.<\u002Fp>\n        <div class=\"f-row\"><label class=\"f-lbl\">Verification code<\u002Flabel><input class=\"f-in\" placeholder=\"000000\" style=\"font-family:'JetBrains Mono',monospace;letter-spacing:.35em;text-align:center;font-size:18px\" maxlength=\"6\"><\u002Fdiv>\n        <div style=\"display:grid;gap:8px 0;background:var(--surface);border:1px solid var(--warm-line);border-radius:10px;padding:14px 16px;margin-bottom:16px\">\n          <div style=\"font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--bark-soft)\">What your access includes<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--bark);line-height:1.6\">Review queue · intake answers &amp; mentor pairing · mentor vetting records · opportunity screening · invites &amp; guardian consent tracking. Every action is logged with your name.<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn btn-primary btn-block\" onclick=\"goView('v-sta-2')\">Verify →<\u002Fbutton>\n        <div class=\"f-hint\" style=\"text-align:center;margin-top:10px\">Prototype: any code works.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"auth-view\" id=\"v-sta-2\" data-screen-label=\"Staff activation — done\">\n        <div class=\"auth-progress\"><div class=\"pp on\"><\u002Fdiv><div class=\"pp on\"><\u002Fdiv><div class=\"pp on\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"auth-kicker\">CM Staff · Step 3 of 3<\u002Fdiv>\n        <div class=\"done-wrap\">\n          <div class=\"done-orb\">✓<\u002Fdiv>\n          <h1 class=\"auth-h\">You're set, Aaliyah.<\u002Fh1>\n          <p class=\"auth-sub\">Your console is where everything the community submits comes to be reviewed — intakes, mentor pairings, milestones, endorsements, and partner requests.<\u002Fp>\n          <a class=\"btn btn-primary btn-block\" style=\"margin-top:6px;text-decoration:none\" href=\"CM Admin.html\">Open the admin console →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<script>\nfunction goView(id){document.querySelectorAll('.auth-view').forEach(v=>v.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}\nfunction authTab(t){\n  document.getElementById('tab-signin').classList.toggle('on',t==='signin');\n  document.getElementById('tab-invite').classList.toggle('on',t==='invite');\n  document.getElementById('pane-signin').style.display=t==='signin'?'':'none';\n  document.getElementById('pane-invite').style.display=t==='invite'?'':'none';\n}\nfunction signInAs(role){\n  if(role==='staff'){location.href='CM Admin.html';return;}\n  if(role==='mentor'){location.href='CM Mentor.html';return;}\n  location.href='CM Alumni Profile.html';\n}\nconst INVITES={'CM-STU-4471':'v-stu-1','CM-MEN-8215':'v-men-1','CM-STA-1093':'v-sta-1'};\nfunction useCode(c){document.getElementById('inv-code').value=c;checkInvite();}\nfunction checkInvite(){\n  const c=document.getElementById('inv-code').value.trim().toUpperCase();\n  if(INVITES[c]){document.getElementById('inv-err').style.display='none';goView(INVITES[c]);}\n  else document.getElementById('inv-err').style.display='block';\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
